allow_anonymous true
password_file /mosquitto/data/passwd
acl_file /mosquitto/config/acl
log_dest stdout

# Message Persistence (used for config topics)
persistence true
persistence_location /mosquitto/data/

# JWT Authentication
auth_plugin /mosquitto/go-auth.so
auth_opt_backends files,jwt
auth_opt_jwt_mode remote
auth_opt_jwt_host mqtt-backend
auth_opt_jwt_port 3000
auth_opt_jwt_host_whitelist mqtt-backend
auth_opt_jwt_getuser_uri /auth/verify
auth_opt_jwt_aclcheck_uri /auth/acl
auth_opt_jwt_username_field sub

# MQTT
listener 1883 0.0.0.0

# WebSockets
listener 9001 0.0.0.0
protocol websockets
